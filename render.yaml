databases:
  - name: exam-db
    databaseName: exam_db
    user: exam_user
    plan: free

services:
  - type: web
    name: exam-administration-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: exam-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
