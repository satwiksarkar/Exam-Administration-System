services:
  db:
    image: postgres:15
    container_name: exam-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: exam_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exam_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  exam-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exam-administration-system
    ports:
      - "10000:10000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=exam_db
      - DB_PORT=5432
      - PORT=10000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./schedule_storage:/app/schedule_storage
      - ./database:/app/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  db_data:
